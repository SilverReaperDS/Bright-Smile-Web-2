$kind: http-request
name: Login
method: POST
url: 'http://localhost:5000/login'
order: 2000
body:
  type: json
  content: |-
    {
      "username": "admin",
      "password": "BrightSmile2025!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.token) {
        pm.environment.set('token', res.token);
        console.log('Token saved to environment variable: token');
      }
